services:
  - type: web
    name: amn-pickle
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_CODE
        sync: false
      - key: USER_RESET_CODE
        sync: false
      - key: ADMIN_RESET_CODE
        sync: false
      - key: CORS_ORIGIN
        value: "*"
